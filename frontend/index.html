<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostHarvest</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <h1 class="logo">PostHarvest</h1>
        <ul class="nav-links">
            <li><a href="#" data-view="feed" class="active">Feed</a></li>
            <li><a href="#" data-view="categories">Categories</a></li>
            <li><a href="#" data-view="analytics">Analytics</a></li>
        </ul>
    </nav>

    <main class="content">
        <section id="view-feed" class="view active">
            <div class="feed-header">
                <h2>Saved Posts</h2>
                <div class="feed-controls">
                    <input type="text" id="search-input" placeholder="Search posts..." class="search-input">
                    <select id="filter-author" class="filter-select">
                        <option value="">All Authors</option>
                    </select>
                    <select id="filter-tag" class="filter-select">
                        <option value="">All Tags</option>
                    </select>
                </div>
            </div>
            <div id="posts-list" class="posts-list"></div>
        </section>

        <section id="view-detail" class="view">
            <button id="back-to-feed" class="back-btn">&larr; Back to Feed</button>
            <div id="post-detail"></div>
        </section>

        <section id="view-categories" class="view">
            <h2>Categories & Tags</h2>
            <div id="categories-panel"></div>
            <h3 style="margin-top:24px;">Tags</h3>
            <div id="tags-cloud"></div>
        </section>

        <section id="view-analytics" class="view">
            <h2>Analytics</h2>
            <div id="analytics-panel"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
